# Apache vhost for the rmdownloader website on the VPS.
# Copy to /etc/apache2/sites-available/rmdownloader.conf and adjust ServerName.
<VirtualHost *:80>
    ServerName 172.104.186.245
    DocumentRoot /var/www/rmdownloader/website

    <Directory /var/www/rmdownloader/website>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Never serve the secret config or sample files as plain text.
    <FilesMatch "config(\.sample)?\.php$">
        Require all granted
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/rmdownloader-error.log
    CustomLog ${APACHE_LOG_DIR}/rmdownloader-access.log combined
</VirtualHost>

# After enabling, run certbot to add HTTPS:
#   sudo certbot --apache -d your.domain.com
