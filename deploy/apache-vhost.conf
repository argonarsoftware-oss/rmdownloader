# Apache vhost for the rmdownloader website on the VPS (172.104.186.245).
# Copy to /etc/apache2/sites-available/rmdownloader.conf
<VirtualHost *:80>
    ServerName dos.argonar.co
    DocumentRoot /var/www/rmdownloader/website

    <Directory /var/www/rmdownloader/website>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/rmdownloader-error.log
    CustomLog ${APACHE_LOG_DIR}/rmdownloader-access.log combined
</VirtualHost>

# DNS: point an A record  dos.argonar.co -> 172.104.186.245
#
# Enable, then add free HTTPS with certbot:
#   sudo a2ensite rmdownloader && sudo a2enmod rewrite headers
#   sudo systemctl reload apache2
#   sudo certbot --apache -d dos.argonar.co
